<div class="dashboard-layout">
  <aside class="sidebar">...</aside>
  
  <main class="main-content">
    <div class="page-header">
      <h1>Your Bookings</h1>
      
      <!-- View Toggle -->
      <div class="view-toggle">
        <button class="view-btn active" data-view="calendar">
          📅 Calendar View
        </button>
        <button class="view-btn" data-view="list">
          📋 List View
        </button>
      </div>
      
      <!-- Filters -->
      <div class="filters">
        <select id="booking-filter">
          <option value="upcoming">Upcoming</option>
          <option value="past">Past</option>
          <option value="all">All Bookings</option>
        </select>
      </div>
    </div>
    
    <!-- Calendar View -->
    <div id="calendar-view" class="view-content active">
      <div id="bookings-calendar"></div>
    </div>
    
    <!-- List View -->
    <div id="list-view" class="view-content">
      <table class="bookings-table">
        <thead>
          <tr>
            <th>Date</th>
            <th>Time</th>
            <th>Client</th>
            <th>Email</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="bookings-list">
          <!-- Populated via JavaScript -->
          <tr data-booking-id="booking_123">
            <td>Mar 15, 2024</td>
            <td>9:00 AM</td>
            <td>Mark Johnson</td>
            <td>mark@example.com</td>
            <td>
              <select class="status-select">
                <option value="confirmed" selected>Confirmed</option>
                <option value="canceled">Canceled</option>
                <option value="rescheduled">Rescheduled</option>
              </select>
            </td>
            <td>
              <button class="btn-icon cancel-btn" title="Cancel">
                ❌
              </button>
              <button class="btn-icon reschedule-btn" title="Reschedule">
                🔄
              </button>
              <button class="btn-icon details-btn" title="View Details">
                👁️
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>
</div>

<!-- Booking Details Modal -->
<div id="booking-modal" class="modal">
  <div class="modal-content">
    <h3>Booking Details</h3>
    <div id="booking-details">
      <!-- Populated dynamically -->
    </div>
    <div class="modal-actions">
      <button class="btn-primary" id="send-reminder">
        Send Reminder
      </button>
      <button class="btn-secondary" id="close-modal">
        Close
      </button>
    </div>
  </div>
</div>
