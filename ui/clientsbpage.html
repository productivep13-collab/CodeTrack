<div class="booking-container">
  <!-- Header -->
  <div class="booking-header">
    <img src="/api/users/john/avatar" alt="John" class="owner-avatar">
    <div>
      <h1>Book a meeting with John</h1>
      <p>Select a time that works for you</p>
    </div>
  </div>
  
  <!-- Calendar -->
  <div class="booking-calendar">
    <div class="calendar-header">
      <button id="prev-week">←</button>
      <h3 id="current-week">Week of March 11</h3>
      <button id="next-week">→</button>
    </div>
    
    <div class="calendar-grid">
      <!-- Generated via JavaScript -->
      <div class="time-slot available" data-time="2024-03-15T09:00:00">
        <div class="slot-time">9:00 AM</div>
        <div class="slot-label">Available</div>
      </div>
      <div class="time-slot booked">
        <div class="slot-time">9:30 AM</div>
        <div class="slot-label">Booked</div>
      </div>
      <!-- More slots... -->
    </div>
  </div>
  
  <!-- Booking Form (hidden initially) -->
  <div id="booking-form" class="hidden">
    <h3>Your Information</h3>
    <form id="client-booking-form">
      <input type="hidden" id="selected-time" name="selected_time">
      
      <div class="form-group">
        <label for="client-name">Your Name *</label>
        <input 
          type="text" 
          id="client-name" 
          name="name" 
          placeholder="John Smith"
          required
        >
      </div>
      
      <div class="form-group">
        <label for="client-email">Email Address *</label>
        <input 
          type="email" 
          id="client-email" 
          name="email" 
          placeholder="you@example.com"
          required
        >
      </div>
      
      <div class="form-group">
        <label for="client-phone">Phone Number (optional)</label>
        <input 
          type="tel" 
          id="client-phone" 
          name="phone" 
          placeholder="+1 (555) 123-4567"
        >
        <small>For SMS reminders</small>
      </div>
      
      <div class="form-group">
        <label for="meeting-notes">Meeting Notes (optional)</label>
        <textarea 
          id="meeting-notes" 
          name="notes" 
          placeholder="What would you like to discuss?"
          rows="3"
        ></textarea>
      </div>
      
      <div class="form-group">
        <input type="checkbox" id="email-optin" name="email_optin" checked>
        <label for="email-optin">
          Send me email reminders about this meeting
        </label>
      </div>
      
      <button type="submit" class="btn-primary btn-large btn-full">
        Confirm Booking
      </button>
    </form>
  </div>
</div>

<script>
// Fetch available slots for this user
const slug = window.location.pathname.split('/').pop();
fetch(`/api/public/availability/${slug}`)
  .then(res => res.json())
  .then(slots => {
    // Render calendar with available slots
    renderCalendar(slots);
  });

// Handle time slot selection
document.querySelectorAll('.time-slot.available').forEach(slot => {
  slot.addEventListener('click', () => {
    const time = slot.getAttribute('data-time');
    document.getElementById('selected-time').value = time;
    document.getElementById('booking-form').classList.remove('hidden');
    window.scrollTo(0, document.getElementById('booking-form').offsetTop);
  });
});

// Handle booking submission
document.getElementById('client-booking-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const formData = new FormData(e.target);
  const data = Object.fromEntries(formData);
  
  const response = await fetch('/api/public/bookings', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  });
  
  if (response.ok) {
    const result = await response.json();
    window.location.href = `/confirm/${result.booking_id}`;
  }
});
</script>
