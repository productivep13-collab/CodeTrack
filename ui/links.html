<div class="dashboard-layout">
  <aside class="sidebar">...</aside>
  
  <main class="main-content">
    <div class="page-header">
      <h1>Your Booking Links</h1>
      <button id="create-link-btn" class="btn-primary">
        + Create New Link
      </button>
    </div>
    
    <!-- Links List -->
    <div class="links-container">
      <div class="link-card">
        <div class="link-header">
          <h3>30-Minute Consultation</h3>
          <div class="link-actions">
            <button class="btn-icon copy-btn" data-url="https://schedulepro.com/book/john">
              📋 Copy
            </button>
            <button class="btn-icon share-btn">
              📤 Share
            </button>
            <button class="btn-icon edit-btn">
              ✏️ Edit
            </button>
            <button class="btn-icon delete-btn">
              🗑️ Delete
            </button>
          </div>
        </div>
        <div class="link-url">
          https://schedulepro.com/book/john
        </div>
        <div class="link-details">
          <span class="badge">Duration: 30 min</span>
          <span class="badge">Bookings: 12</span>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Create Link Modal -->
<div id="link-modal" class="modal">
  <div class="modal-content">
    <h3>Create Booking Link</h3>
    
    <form id="link-form">
      <div class="form-group">
        <label>Link Name</label>
        <input 
          type="text" 
          name="link_name" 
          placeholder="e.g., 30-Minute Consultation"
          required
        >
      </div>
      
      <div class="form-group">
        <label>Meeting Duration</label>
        <select name="duration" required>
          <option value="15">15 minutes</option>
          <option value="30" selected>30 minutes</option>
          <option value="45">45 minutes</option>
          <option value="60">60 minutes</option>
          <option value="custom">Custom...</option>
        </select>
      </div>
      
      <!-- Custom Questions -->
      <div class="form-group">
        <label>Additional Questions (Optional)</label>
        <div id="questions-container">
          <div class="question-item">
            <input 
              type="text" 
              placeholder="e.g., What's this meeting about?"
              class="question-input"
            >
            <button type="button" class="btn-remove">×</button>
          </div>
        </div>
        <button type="button" id="add-question" class="btn-secondary">
          + Add Question
        </button>
      </div>
      
      <div class="modal-actions">
        <button type="button" class="btn-secondary">Cancel</button>
        <button type="submit" class="btn-primary">Create Link</button>
      </div>
    </form>
  </div>
</div>

<script>
// Copy URL functionality
document.querySelectorAll('.copy-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const url = btn.getAttribute('data-url');
    navigator.clipboard.writeText(url);
    showToast('Link copied to clipboard!');
  });
});

// Create new link
document.getElementById('link-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const formData = new FormData(e.target);
  const data = Object.fromEntries(formData);
  
  const response = await fetch('/api/links', {
    method: 'POST',
    body: JSON.stringify(data)
  });
  
  const result = await response.json();
  if (result.success) {
    window.location.reload();
  }
});
</script>
